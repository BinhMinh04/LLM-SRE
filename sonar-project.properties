# SonarQube Cloud (SonarCloud) project config.
#
# IMPORTANT: replace the two keys below with the EXACT values SonarCloud shows
# on your project's page (Project → Information). They are usually:
#   organization = your org key (often your lowercased GitHub login)
#   projectKey   = <org>_<repo>, e.g. BinhMinh04_LLM-SRE
# A mismatch makes the scan fail once SONAR_TOKEN is set.
sonar.organization=binhminh04
sonar.projectKey=BinhMinh04_LLM-SRE

# What to analyze (backend Python + frontend TS); keep out vendored/build dirs.
sonar.sources=backend/app,frontend/src
sonar.tests=backend/tests
sonar.python.version=3.11,3.12
sonar.exclusions=**/node_modules/**,**/.venv/**,**/dist/**,**/__pycache__/**,**/*.test.ts,**/*.test.tsx
