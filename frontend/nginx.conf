server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Same relative-API pattern as the Vite dev proxy (vite.config.ts) — proxy
    # to the backend service by its Docker Compose service name.
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SSE incident-analysis stream: buffering would hold each event until nginx's buffer
    # fills or the response ends, defeating live progress (SSE streaming design, decision
    # 2026-07-20).
    location ~ ^/api/incidents/[^/]+/stream$ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }

    location = /healthz {
        proxy_pass http://backend:8000/healthz;
    }

    # SPA fallback — unknown paths resolve to index.html for client-side routing.
    location / {
        try_files $uri /index.html;
    }
}
